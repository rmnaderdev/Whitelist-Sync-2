pluginManagement {
  repositories {
    gradlePluginPortal()
    maven {
      name = 'Fabric'
      url = 'https://maven.fabricmc.net/'
    }
    maven {
      name = 'Forge'
      url = 'https://maven.minecraftforge.net/'
    }
    maven {
      name = 'NeoForge'
      url = 'https://maven.neoforged.net/releases'
    }
  }
}

plugins {
  id 'org.gradle.toolchains.foojay-resolver-convention' version '0.8.0'
}

rootProject.name = 'whitelistsync-common'

include (
        ':WhitelistSyncCore',
        ':forge-1.12.2',
        ':forge-1.16.5',
        ':forge-1.18.2',
        ':forge-1.19',
        ':forge-1.19.2',
        ':forge-1.20.1',
        ':forge-1.20.2',
        ':forge-1.20.6',
        ':forge-1.21'
)