plugins {
    id 'java'
    id 'maven-publish'
}

allprojects {
    repositories {
        mavenLocal()
        maven { url 'https://libraries.minecraft.net/' }
        maven { url "https://cursemaven.com" }
    }

    apply plugin: 'java'

    group = mod_group_id
    version = mod_version
}

subprojects {
    apply plugin: 'java'
    apply plugin: 'maven-publish'

    sourceCompatibility = 1.8
    targetCompatibility = 1.8
    tasks.withType(JavaCompile) {
        options.encoding = 'UTF-8'
    }
}